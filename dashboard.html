<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>收藏夹整理页</title>
    <link rel="stylesheet" href="dashboard.css">
  </head>
  <body>
    <div class="page-shell">
      <div id="searchBar" class="search-bar">
        <div class="search-bar__inner">
          <input id="searchInput" type="text" placeholder="搜索标题或网址" autocomplete="off" spellcheck="false">
        </div>
      </div>

      <div class="status-row">
        <p id="statusMessage" class="status" aria-live="polite"></p>
      </div>

      <main id="dashboard" class="dashboard"></main>
    </div>

    <template id="emptyStateTemplate">
      <section class="empty-state">
        <h2>还没有导入收藏夹</h2>
        <p>点击插件里的“打开工作台”，页面会自动读取当前浏览器收藏内容。</p>
      </section>
    </template>

    <script src="dashboard.js"></script>
  </body>
</html>
